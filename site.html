<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeaDevs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0A0F1A 0%, #0D1A1A 100%);
            color: #E0E0E0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 20px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 70px;
            margin-bottom: 12px;
            display: inline-block;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        h1 {
            font-size: 32px;
            font-weight: 500;
            margin-bottom: 6px;
            letter-spacing: 1px;
            color: #E0E0E0;
            animation: fadeIn 0.8s ease-out 0.1s both;
        }

        .tagline {
            color: #6A7A8A;
            font-size: 13px;
            margin-bottom: 30px;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        .btn {
            display: block;
            background: #1A2228;
            color: #E0E0E0;
            padding: 10px 24px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 14px;
            margin: 10px auto;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            width: 200px;
            animation: fadeIn 0.8s ease-out both;
        }

        .btn:nth-child(1) { animation-delay: 0.3s; }
        .btn:nth-child(2) { animation-delay: 0.4s; }
        .btn:nth-child(3) { animation-delay: 0.5s; }

        .btn:hover {
            background: #2A3A2A;
            color: #FFFFFF;
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(0, 255, 100, 0.15);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .footer {
            margin-top: 40px;
            color: #4A5A6A;
            font-size: 11px;
            animation: fadeIn 0.8s ease-out 0.6s both;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1A2228;
            border-radius: 20px;
            padding: 30px;
            min-width: 250px;
            text-align: center;
            animation: fadeIn 0.2s ease;
            border: 1px solid #2A3A2A;
        }
        .modal-content a {
            display: block;
            background: #2A3A2A;
            color: #E0E0E0;
            padding: 12px 20px;
            margin: 15px 0;
            border-radius: 30px;
            text-decoration: none;
            transition: 0.2s;
        }
        .modal-content a:hover {
            background: #00AA55;
            color: white;
        }
        .close-btn {
            background: #2A3A2A;
            margin-top: 10px;
            border: none;
            width: 100%;
        }
        .close-btn:hover {
            background: #AA3333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🍵</div>
        <h1>TeaDevs</h1>
        <div class="tagline">code with tea</div>
        <a href="https://t.me/TeaDevs_2026" class="btn">Telegram</a>
        <button class="btn" id="projectsBtn">Проекты</button>
        <a href="https://github.com/xl15kot" class="btn">GitHub</a>
        <div class="footer">AveBas & LimuxMintREAL</div>
    </div>

    <!-- Модальное окно -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 16px;">📦 Проекты</h3>
            <a href="https://github.com/xl15kot/T.UserBot_Reborn" target="_blank">🤖 T.UserBot</a>
            <button class="btn close-btn" id="closeModal">Закрыть</button>
        </div>
    </div>

    <script>
        const modal = document.getElementById('modal');
        const projectsBtn = document.getElementById('projectsBtn');
        const closeModal = document.getElementById('closeModal');

        projectsBtn.onclick = () => {
            modal.style.display = 'flex';
        };
        closeModal.onclick = () => {
            modal.style.display = 'none';
        };
        modal.onclick = (e) => {
            if (e.target === modal) modal.style.display = 'none';
        };
    </script>
</body>
</html>
