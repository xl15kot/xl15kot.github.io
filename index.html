<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeaDevs | Разработка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0A0F1A 0%, #0D1A1A 100%);
            color: #E0E0E0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Анимированные частицы */
        .particle {
            position: fixed;
            background: rgba(0, 255, 150, 0.4);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-20vh) translateX(40px) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            text-align: center;
            padding: 20px;
            z-index: 2;
            position: relative;
            animation: containerFadeIn 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        @keyframes containerFadeIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Логотип-картинка */
        .logo-img {
            width: 90px;
            height: auto;
            margin-bottom: 12px;
            display: inline-block;
            animation: logoFloat 3s ease-in-out infinite, logoGlow 2s ease-in-out infinite alternate;
            filter: drop-shadow(0 0 8px rgba(0,255,100,0.3));
        }

        @keyframes logoFloat {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-8px) rotate(3deg);
            }
        }

        @keyframes logoGlow {
            from {
                filter: drop-shadow(0 0 2px rgba(0,255,100,0.3));
            }
            to {
                filter: drop-shadow(0 0 12px rgba(0,255,100,0.7));
            }
        }

        h1 {
            font-size: 32px;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 2px;
            background: linear-gradient(120deg, #E0E0E0, #AAFFCC);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: titleReveal 0.8s ease-out 0.2s both;
        }

        @keyframes titleReveal {
            from {
                opacity: 0;
                letter-spacing: 6px;
                filter: blur(8px);
            }
            to {
                opacity: 1;
                letter-spacing: 2px;
                filter: blur(0);
            }
        }

        .tagline {
            color: #6A7A8A;
            font-size: 13px;
            margin-bottom: 32px;
            animation: fadeInUp 0.6s ease-out 0.3s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn {
            display: block;
            background: #1A2228;
            color: #E0E0E0;
            padding: 12px 24px;
            border-radius: 40px;
            text-decoration: none;
            font-size: 15px;
            margin: 14px auto;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            width: 250px;
            border: 1px solid rgba(80, 180, 120, 0.2);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out both;
        }

        .btn:nth-child(1) { animation-delay: 0.4s; }
        .btn:nth-child(2) { animation-delay: 0.5s; }
        .btn:nth-child(3) { animation-delay: 0.6s; }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(0, 255, 150, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn:hover {
            background: #2A3A2A;
            color: #FFFFFF;
            transform: translateY(-3px) scale(1.02);
            border-color: rgba(0, 255, 150, 0.6);
            box-shadow: 0 8px 20px rgba(0, 255, 100, 0.2);
        }

        .btn:active {
            transform: translateY(1px) scale(0.98);
        }

        .footer {
            margin-top: 40px;
            color: #4A5A6A;
            font-size: 11px;
            animation: fadeInUp 0.6s ease-out 0.7s both;
        }

        /* Тост-уведомление */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #1A2A24;
            color: #AAFFCC;
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 13px;
            z-index: 1000;
            opacity: 0;
            animation: toastAppear 2s ease forwards;
            border: 1px solid rgba(0,255,150,0.5);
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        @keyframes toastAppear {
            0% {
                opacity: 0;
                transform: translateX(-50%) scale(0.8);
            }
            15% {
                opacity: 1;
                transform: translateX(-50%) scale(1);
            }
            85% {
                opacity: 1;
                transform: translateX(-50%) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateX(-50%) scale(0.9);
                visibility: hidden;
            }
        }

        .status-indicator {
            position: fixed;
            bottom: 42px;
            right: 42px;
            width: 10px;
            height: 10px;
            background: #4AEAA0;
            border-radius: 50%;
            box-shadow: 0 0 8px #3cff9e;
            animation: blinkGreen 1.5s infinite;
            z-index: 2;
        }

        @keyframes blinkGreen {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 15px #3cff9e; }
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            align-items: center;
            justify-content: center;
            z-index: 1001;
        }
        .modal-content {
            background: #1A2228;
            border-radius: 30px;
            padding: 30px;
            min-width: 280px;
            text-align: center;
            animation: fadeIn 0.2s ease;
            border: 1px solid #2A3A2A;
            backdrop-filter: blur(8px);
        }
        .modal-content a {
            display: block;
            background: #2A3A2A;
            color: #E0E0E0;
            padding: 12px 20px;
            margin: 15px 0;
            border-radius: 40px;
            text-decoration: none;
            transition: 0.2s;
        }
        .modal-content a:hover {
            background: #00AA55;
            color: white;
        }
        .close-btn {
            background: #2A3A2A;
            margin-top: 10px;
            border: none;
            width: 100%;
        }
        .close-btn:hover {
            background: #AA3333;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="status-indicator"></div>

    <div class="container">
        <!-- Логотип-картинка (замените ссылку на путь к вашему PNG) -->
        <img src="tea.png" alt="Tea Logo" class="logo-img">
        <h1>TeaDevs</h1>
        <div class="tagline">code with tea</div>

        <button class="btn" id="projectsBtn">📦 Проекты</button>
        <a href="https://t.me/TeaDevs_2026" class="btn" target="_blank">📱 Telegram</a>
        <a href="https://github.com/xl15kot" class="btn" target="_blank">🐙 GitHub</a>

        <div class="footer">
            AveBas & LimuxMintREAL
        </div>
    </div>

    <!-- Модальное окно -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 16px;">📦 Наши проекты</h3>
            <a href="https://github.com/xl15kot/T.UserBot_Reborn" target="_blank">🤖 T.UserBot Reborn</a>
            <button class="btn close-btn" id="closeModal">Закрыть</button>
        </div>
    </div>

    <script>
        // Модальное окно
        const modal = document.getElementById('modal');
        const projectsBtn = document.getElementById('projectsBtn');
        const closeModal = document.getElementById('closeModal');

        projectsBtn.onclick = () => {
            modal.style.display = 'flex';
        };
        closeModal.onclick = () => {
            modal.style.display = 'none';
        };
        modal.onclick = (e) => {
            if (e.target === modal) modal.style.display = 'none';
        };

        // Создание анимированных частиц
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 4 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = Math.random() * 8 + 6 + 's';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particle.style.opacity = Math.random() * 0.4 + 0.1;
            document.body.appendChild(particle);
            
            setTimeout(() => {
                particle.remove();
            }, 14000);
        }

        setInterval(createParticle, 400);
        for (let i = 0; i < 15; i++) {
            setTimeout(() => createParticle(), i * 150);
        }
    </script>
</body>
</html>
