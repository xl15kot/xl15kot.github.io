<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeaDevs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, monospace;
            background: #0D1117;
            color: #C9D1D9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .logo {
            font-size: 80px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 48px;
            background: linear-gradient(135deg, #C9D1D9, #238636);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .tagline {
            color: #8B949E;
            font-size: 18px;
            margin-bottom: 30px;
        }
        .links {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            background: #21262D;
            color: #C9D1D9;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
            border: 1px solid #30363D;
        }
        .btn:hover {
            background: #238636;
            color: white;
            border-color: #238636;
        }
        .footer {
            margin-top: 50px;
            color: #8B949E;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🍵</div>
        <h1>TeaDevs</h1>
        <div class="tagline">code with tea</div>
        <div class="links">
            <a href="#" class="btn">GitHub</a>
            <a href="#" class="btn">T.UserBot</a>
            <a href="#" class="btn">Docs</a>
        </div>
        <div class="footer">
            AveBas & LimuxMintREAL • 2025
        </div>
    </div>
</body>
</html>
