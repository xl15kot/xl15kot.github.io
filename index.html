<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeaDevs | Офицальный сайт</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-color: #00f2fe;
            --secondary-color: #4facfe;
            --bg-dark: #0b0f1a;
            --text-color: #ffffff;
            --glass: rgba(255, 255, 255, 0.07);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(79, 172, 254, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 242, 254, 0.15) 0%, transparent 40%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Контейнер */
        .card {
            width: 90%;
            max-width: 420px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            animation: cardAppear 1s ease-out;
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Стили чашки чая */
        .tea-logo {
            font-size: 80px;
            display: inline-block;
            margin-bottom: 20px;
            position: relative;
            filter: drop-shadow(0 0 15px rgba(0, 242, 254, 0.5));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Эффект пара */
        .tea-logo::after {
            content: '♨️';
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 30px;
            opacity: 0.5;
            animation: steam 2s infinite linear;
        }

        @keyframes steam {
            0% { transform: translate(-50%, 0) scale(1); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translate(-50%, -20px) scale(1.5); opacity: 0; }
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.2rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, var(--accent-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .subtitle {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 35px;
            font-weight: 300;
        }

        /* Кнопки */
        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            color: white;
            padding: 16px 20px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .btn i {
            margin-right: 12px;
            font-size: 1.2rem;
        }

        .btn:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.15);
        }

        /* Цвета иконок */
        .fa-code { color: #00f2fe; }
        .fa-user-gear { color: #f9d423; }
        .fa-paper-plane { color: #24A1DE; }

        footer {
            margin-top: 40px;
            font-size: 0.75rem;
            opacity: 0.4;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="tea-logo">☕</div>
        <h1>TeaDevs</h1>
        <p class="subtitle">Development with a taste of perfection</p>

        <div class="btn-list">
            <!-- Кнопка 1 -->
            <a href="https://github.com/xl15kot/T.UserBot_Reborn" target="_blank" class="btn">
                <i class="fas fa-code"></i>
                T.USERBOT
            </a>

            <!-- Кнопка 2 -->
            <a href="https://github.com/xl15kot" target="_blank" class="btn">
                <i class="fas fa-user-gear"></i>
                Профиль создателя
            </a>

            <!-- Кнопка 3 -->
            <a href="https://t.me/TeaDevs_2026" target="_blank" class="btn">
                <i class="fab fa-telegram"></i>
                Telegram Канал
            </a>
        </div>

        <footer>
            MADE BY TEADEVS &copy; 2024
        </footer>
    </div>

</body>
</html>
